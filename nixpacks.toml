[phases.setup]
nixPkgs = ['python3', 'gcc', 'nodejs_20']

[phases.install]
cmds = [
  'python3 -m venv /opt/venv',
  '/opt/venv/bin/pip install hatchling build setuptools',
  '/opt/venv/bin/pip install -e ".[all]"'
]

[start]
cmd = 'cd /app/frontend && npm install && npm run build && cd /app && PYTHONPATH=/app/src /opt/venv/bin/opencmo-web'
