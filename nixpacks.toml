[phases.setup]
nixPkgs = ['python3', 'gcc', 'nodejs_20']

[phases.install]
cmds = [
  'python3 -m venv /opt/venv',
  '/opt/venv/bin/pip install fastapi uvicorn jinja2 aiosqlite python-dotenv httpx openai-agents anthropic google-generativeai apscheduler praw tweepy tavily-python crawl4ai'
]

[phases.build]
cmds = [
  'cd /app/frontend && npm install && npm run build'
]

[start]
cmd = '/opt/venv/bin/pip install -e ".[all]" --no-build-isolation && /opt/venv/bin/opencmo-web'
